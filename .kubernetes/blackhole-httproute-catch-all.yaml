apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: catch-all
  namespace: %KUBERNETES_NAMESPACE%
spec:
  parentRefs:
    - name: %APP_NAME%
  hostnames:
    - "a.%DNS_ZONE_NAME%"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: blackhole-service
          port: 80