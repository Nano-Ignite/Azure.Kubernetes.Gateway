apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: %APP_NAME%
  namespace: %KUBERNETES_NAMESPACE%
  annotations:
    alb.networking.azure.io/alb-namespace: %KUBERNETES_NAMESPACE%
    alb.networking.azure.io/alb-name: %KUBERNETES_CLUSTER%-alb
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: %APP_NAME%-tls
